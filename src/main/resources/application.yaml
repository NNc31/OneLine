spring:
  application:
    name: OneLine
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/oneline_db}
    username: ${DB_USER:oneline_user}
    password: ${DB_PASSWORD:oneline_pass}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

oneline:
  participant:
    activity-window: PT10M
  session:
    cookie-name: oneline_session
    cookie-secure: false
    cookie-same-site: Lax
    cookie-max-age: P30D
  crypto:
    algorithm: aes-gcm
  rate-limit:
    create-chat:
      capacity: 5
      refill-period: PT1M
    join:
      capacity: 10
      refill-period: PT1M
