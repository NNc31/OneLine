spring:
  application:
    name: OneLine
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/oneline_db}
    username: ${DB_USER:oneline_user}
    password: ${DB_PASSWORD:oneline_pass}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:false}
  lifecycle:
    timeout-per-shutdown-phase: 20s

server:
  forward-headers-strategy: framework
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: never

oneline:
  participant:
    activity-window: PT10M
  session:
    cookie-name: oneline_session
    cookie-secure: false
    cookie-same-site: Lax
    cookie-max-age: P30D
  rate-limit:
    create-chat:
      capacity: 5
      refill-period: PT1M
    join:
      capacity: 10
      refill-period: PT1M
    message:
      capacity: 25
      refill-period: PT10S
    attachment:
      capacity: 10
      refill-period: PT1M
  storage:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    public-endpoint: ${MINIO_PUBLIC_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:oneline}
    secret-key: ${MINIO_SECRET_KEY:oneline_secret}
    bucket: ${MINIO_BUCKET:oneline-attachments}
    presign-ttl: PT5M
    max-file-size: 104857600
    unconfirmed-ttl: PT15M
  retention:
    inactivity-window: P365D
    cron: "0 0 3 * * *"
    zone: "GMT+03:00"
