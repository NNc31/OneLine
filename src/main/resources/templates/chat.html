<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OneLine</title>
    <link rel="icon" th:href="@{/favicon.svg}" type="image/svg+xml">
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script th:src="@{/js/theme.js}"></script>
    <script th:src="@{/js/sound.js}"></script>
</head>
<body class="chat-page">

<header class="chat-header">
    <div class="inner">
        <a th:href="@{/}" class="brand">OneLine</a>
        <a th:href="@{/me}" class="brand-link">Session chats</a>
        <span class="spacer"></span>
        <button type="button" class="theme-toggle" data-sound-toggle aria-label="Toggle sound" title="Toggle sound">
            <svg class="i-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
            </svg>
            <svg class="i-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                <line x1="23" y1="9" x2="17" y2="15"></line>
                <line x1="17" y1="9" x2="23" y2="15"></line>
            </svg>
        </button>
        <button type="button" class="theme-toggle" data-theme-toggle aria-label="Toggle theme" title="Toggle theme">
            <svg class="i-light" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <svg class="i-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
        </button>
        <span id="online-count" class="online" hidden></span>
        <span id="ttl-note" class="ttl-note" hidden></span>
        <span class="header-break" aria-hidden="true"></span>
        <span id="me-badge" class="me" hidden></span>
    </div>
</header>

<main class="chat-main">
    <div class="inner" th:attr="data-public-id=${publicId}">

        <section id="missing-secret" class="join-card" hidden>
            <h2>Missing access</h2>
            <p>The link you opened doesn't contain a secret. Ask whoever shared it to send the full URL — the part after <code>#</code> is the access token.</p>
        </section>

        <section id="join-card" class="join-card" hidden>
            <h2>Pick a name</h2>
            <form id="join-form">
                <input type="text" id="join-display-name" maxlength="40" required autofocus aria-label="Display name" aria-describedby="join-hint" placeholder="e.g. Ethan, Ivette, etc.">
                <button type="submit" class="primary">Join chat</button>
            </form>
            <p id="join-error" class="error-message" hidden></p>
        </section>

        <section id="chat-room" class="chat-room" hidden>
            <ul id="messages" class="messages"></ul>
        </section>

    </div>
</main>

<div id="typing-indicator" class="typing" hidden></div>
<div id="upload-progress" class="upload-progress" hidden>
    <span id="upload-progress-label">Uploading...</span>
    <div class="bar"><span id="upload-progress-fill"></span></div>
    <button type="button" id="upload-cancel" class="cancel">Cancel</button>
</div>
<form id="send-form" class="send" autocomplete="off" hidden>
    <input id="attach-input" type="file" hidden>
    <button type="button" id="attach-btn" class="attach" aria-label="Attach a file (up to 100 MB)" title="Attach a file (up to 100 MB)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
        </svg>
    </button>
    <input id="send-input" type="text" name="content" maxlength="4000" aria-label="Message" placeholder="Type something" autocomplete="off">
    <button type="submit" class="primary">Send</button>
</form>
<div id="conn-status" class="conn-status" data-state="connecting" hidden>Connecting...</div>
<dialog id="lightbox" class="lightbox" aria-label="Image preview"><img alt=""></dialog>

<script th:src="@{/js/stomp.umd.min.js}"></script>
<script th:src="@{/js/crypto.js}"></script>
<script th:src="@{/js/app.js}" defer></script>

</body>
</html>
