<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OneLine</title>
    <link rel="icon" th:href="@{/favicon.svg}" type="image/svg+xml">
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script th:src="@{/js/theme.js}"></script>
</head>
<body class="landing">
<main>
    <button type="button" class="theme-toggle" data-theme-toggle aria-label="Toggle theme" title="Toggle theme">
        <svg class="i-light" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg class="i-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
    </button>
    <h1>OneLine</h1>
    <p class="lede">Your chat is your link. Your link is your access.</p>
    <div class="ttl-field">
        <label for="ttl-value">Self-destruct messages</label>
        <div class="ttl-inputs">
            <input type="number" id="ttl-value" min="1" inputmode="numeric" placeholder="off" aria-label="Message lifetime">
            <select id="ttl-unit" aria-label="Message lifetime unit">
                <option value="60">minutes</option>
                <option value="3600">hours</option>
                <option value="86400">days</option>
            </select>
        </div>
    </div>
    <button type="button" id="create-chat" class="primary">Create chat</button>
    <p id="create-error" class="error-message" hidden></p>
    <p class="muted-link"><a th:href="@{/me}">Session chats</a></p>
</main>
<script th:src="@{/js/crypto.js}"></script>
<script th:src="@{/js/create.js}" defer></script>
</body>
</html>
