x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:16
    container_name: oneline-postgres
    environment:
      POSTGRES_DB: oneline_db
      POSTGRES_USER: oneline_user
      POSTGRES_PASSWORD: oneline_pass
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oneline_user -d oneline_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: oneline-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging: *default-logging

  minio:
    image: minio/minio
    container_name: oneline-minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: oneline
      MINIO_ROOT_PASSWORD: oneline_secret
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    logging: *default-logging

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: oneline-app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/oneline_db
      DB_USER: oneline_user
      DB_PASSWORD: oneline_pass
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: http://localhost:9000
      MINIO_ACCESS_KEY: oneline
      MINIO_SECRET_KEY: oneline_secret
    ports:
      - "8080:8080"
    logging: *default-logging

volumes:
  pg_data:
  minio_data:
