version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: oneline-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: oneline_db
      POSTGRES_USER: oneline_user
      POSTGRES_PASSWORD: oneline_pass
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
