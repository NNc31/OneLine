x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:16
    container_name: oneline-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: oneline_db
      POSTGRES_USER: oneline_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oneline_user -d oneline_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: oneline-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging: *default-logging

  minio:
    image: minio/minio
    container_name: oneline-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging: *default-logging

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: oneline-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/oneline_db
      DB_USER: oneline_user
      DB_PASSWORD: ${POSTGRES_PASSWORD:?}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: https://${STORAGE_DOMAIN:?}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:?}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?}
      ONELINE_ATTACHMENTS_ENABLED: "${ONELINE_ATTACHMENTS_ENABLED:-true}"
      SERVER_FORWARD_HEADERS_STRATEGY: framework
    logging: *default-logging

  caddy:
    image: caddy:2-alpine
    container_name: oneline-caddy
    restart: unless-stopped
    depends_on:
      - app
      - minio
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?}
      STORAGE_DOMAIN: ${STORAGE_DOMAIN:?}
      ACME_EMAIL: ${ACME_EMAIL:?}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    logging: *default-logging

volumes:
  pg_data:
  minio_data:
  caddy_data:
  caddy_config:
